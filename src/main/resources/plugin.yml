name: FloydBackpack
version: '1.0.3-SNAPSHOT'
main: com.floyd.backpack.FloydBackpackPlugin
api-version: '1.21'
prefix: Floyd-Backpack
load: STARTUP
authors: [ floyd ]
description: floyd背包插件
website: https://github.com/codeNoob2281
commands:
  backpack:
    aliases:
      - bp
    description: 打开背包
permissions:
  floydbackpack.open:
    description: "允许玩家打开背包"
    default: true
  floydbackpack.clear:
    description: "允许玩家清空背包"
    default: op
  floydbackpack.reload:
    description: "重新加载配置"
    default: op
  floydbackpack.help:
    description: "显示帮助信息"
    default: true